# cargo-deny: advisory, license, and duplicate auditing (just deny)

[advisories]
version = 2
ignore = [
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 comes via teloxide -> aquamarine; nothing to upgrade until teloxide drops it" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    # file-level weak copyleft, fine for an unmodified transitive dependency
    # (colored, via petname)
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
